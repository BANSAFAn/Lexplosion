name: PR Build

on:
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore Lexplosion.sln

    - name: Build Core
      run: dotnet build Lexplosion.Core/Lexplosion.Core.csproj --no-restore

    - name: Build Tests
      run: dotnet build Lexplosion.Tests/Lexplosion.Tests.csproj --no-restore

    - name: Build Avalonia
      run: dotnet build LexplosionAvalonia/LexplosionAvalonia.csproj --no-restore

    - name: Build WPF
      if: runner.os == 'Windows'
      run: dotnet build Lexplosion.WPF.NewInterface/Lexplosion.WPF.NewInterface.csproj --no-restore

    - name: Test
      run: dotnet test Lexplosion.sln --no-build --verbosity normal